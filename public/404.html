<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application</title>
</head>
<body>
  <div id="root"></div>
  <script>
    // Для SPA - перенаправляем 404 обратно на index.html
    if (window.location.pathname !== '/' && !window.location.pathname.includes('.')) {
      // Это не файл, а маршрут - перенаправляем на root
      window.location.href = '/';
    }
  </script>
</body>
</html>
